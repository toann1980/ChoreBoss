<div class="modal fade"
     id="numpadModal"
     tabindex="-1"
     role="dialog"
     aria-labelledby="numpadModalLabel"
     aria-hidden="true">
  <div class="modal-dialog custom-modal-width" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="numpadModalLabel">Enter PIN</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="password"
                 class="form-control text-center"
                 id="pinDisplay"
                 readonly />
          <!-- Modal-local hidden pin storage to avoid relying on page-level elements -->
          <input type="hidden" id="modalPin" name="modalPin" />
        </div>
        <div class="numpad">
          {% set buttons = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "C", "0", "←"] %}
          {% for i in range(0, 12, 3) %}
            <div class="row no-gutters">
              {% for j in range(3) %}
                <div class="col-4 p-1">
                  <button class="btn btn-secondary w-100"
                          onclick="addToPin('{{ buttons[i + j] }}')">{{ buttons[i + j] }}</button>
                </div>
              {% endfor %}
            </div>
          {% endfor %}
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" onclick="confirmPin()">Okay</button>
        <button type="button" class="btn btn-primary" data-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script>
  let isConfirmingPin = false;
  let initialPin = "";

  function _getModalPinEl() {
    return document.getElementById("modalPin");
  }

  function _getPagePinEl() {
    return document.getElementById("pin");
  }

  function clearPin() {
    const modalPin = _getModalPinEl();
    const pinDisplay = document.getElementById("pinDisplay");
    if (modalPin) modalPin.value = "";
    if (pinDisplay) pinDisplay.value = "";
    // also clear page-level hidden input if present
    const pagePin = _getPagePinEl();
    if (pagePin) pagePin.value = "";
  }

  function deleteLastPin() {
    const modalPin = _getModalPinEl();
    const pinDisplay = document.getElementById("pinDisplay");
    if (!modalPin) return;
    modalPin.value = modalPin.value.slice(0, -1);
    if (pinDisplay) pinDisplay.value = modalPin.value;
  }

  function addToPin(value) {
    const modalPin = _getModalPinEl();
    const pinDisplay = document.getElementById("pinDisplay");

    if (!modalPin) return;

    if (value === "C") {
      clearPin();
    } else if (value === "←") {
      deleteLastPin();
    } else if (modalPin.value.length < 6) {
      modalPin.value += value;
      if (pinDisplay) pinDisplay.value = modalPin.value;
    }
  }

  function handleKeyPress(event) {
    const key = event.key;
    if (key >= "0" && key <= "9") {
      addToPin(key);
    } else if (key === "Backspace") {
      deleteLastPin();
    } else if (key === "Enter") {
      confirmPin();
    } else if (key === "Escape") {
      clearPin();
    }
  }

  function showPinModal(context) {
    clearPin();
    const ctxEl = document.getElementById("pinContext");
    if (ctxEl) ctxEl.value = context;
    $("#numpadModal").modal("show");
    document.addEventListener("keydown", handleKeyPress);
  }

  function hidePinModal() {
    $("#numpadModal").modal("hide");
    document.removeEventListener("keydown", handleKeyPress);
  }

  function confirmPin() {
    const ctxEl = document.getElementById("pinContext");
    const context = ctxEl ? ctxEl.value : null;
    const modalPin = _getModalPinEl();
    const pinValue = modalPin ? modalPin.value : "";

    // copy modal pin to page-level hidden input if present so server-side templates can read it
    const pagePin = _getPagePinEl();
    if (pagePin) pagePin.value = pinValue;

    if (context === "add_person") {
      if (!isConfirmingPin) {
        initialPin = pinValue;
        isConfirmingPin = true;
        clearPin();
        alert("Please re-enter your PIN to confirm.");
      } else {
        if (pinValue === initialPin) {
          hidePinModal();
          const f = document.getElementById("addPersonForm");
          if (f) f.submit();
        } else {
          alert("PINs do not match. Please try again.");
          clearPin();
          isConfirmingPin = false;
        }
      }
      return;
    }

    // other contexts: call verify_pin endpoint on the bridge
    const choreIdElement = document.getElementById("chore_id");
    const choreId = choreIdElement ? choreIdElement.value : null;
    const personIdElement = document.getElementById("person_id");
    const personId = personIdElement ? personIdElement.value : null;

    fetch('/verify_pin', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        pin: pinValue, context: context, chore_id: choreId, person_id: personId
      }),
    })
      .then(response => response.json())
      .then(data => {
        console.log(`context: ${context}, status: ${data.status}`);
        if (data.status === 'success') {
          try {
            switch (context) {
              case "change_sequence":
                fetch('/update_sequence', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({sequence_data: document.getElementById('sequenceData').value}),
                })
                  .then(response => response.json())
                  .then(result => {
                    // Accept both old and new response shapes for compatibility
                    if (result && (result.status === 'success' || result.success === true)) {
                      alert('Sequence updated successfully!');
                    } else {
                      const msg = (result && (result.error || result.message)) || 'Failed to update sequence.';
                      alert(msg);
                    }
                  })
                  .catch(error => {
                    console.error('There was a problem with the fetch operation:', error);
                    alert('Failed to update sequence.');
                  });
                break;
              case "complete_chore":
                {
                  const f = document.getElementById("completeChoreForm");
                  if (f) f.submit();
                }
                break;
              case "delete_person":
                {
                  const f = document.getElementById("deletePersonForm");
                  if (f) f.submit();
                }
                break;
              case "delete_chore":
                {
                  const f = document.getElementById("deleteChoreForm");
                  if (f) f.submit();
                }
                break;
              case "edit_person":
                {
                  const f = document.getElementById("editPersonForm");
                  if (f) f.submit();
                }
                break;
              case "edit_chore":
                {
                  const f = document.getElementById("editChoreForm");
                  if (f) f.submit();
                }
                break;
              default:
                console.error("Unknown context: ", context);
            }
          } catch (e) {
            console.error('Error handling success context action', e);
          }
          hidePinModal();
        } else {
          // Provide a clearer error reason when available
          if (data && data.reason === 'not_admin') {
            alert('PIN accepted but this action requires an admin account.');
          } else if (data && data.reason === 'invalid') {
            alert('Invalid PIN. Please try again.');
          } else {
            alert('PIN verification failed. Please try again.');
          }
          clearPin();
        }
      })
      .catch(err => {
        console.error('verify_pin fetch failed', err);
        alert('Unable to verify PIN right now. Try again later.');
      });
  }

</script>
