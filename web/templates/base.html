<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="ChoreBoss - Manage your chores efficiently" />
    <meta name="keywords" content="chores, management, productivity, ChoreBoss" />
    <title>
      {% block title %}
        ChoreBoss
      {% endblock title %}
    </title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="icon"
          href="{{ url_for('static', path='images/favicon.ico') }}"
          type="image/x-icon" />
    <link rel="stylesheet"
          href="{{ url_for('static', path='css/styles.css') }}" />
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  </head>
  <body>
    {% if request.session.get('token') %}
      <div class="container mt-3">
        <div class="d-flex justify-content-between align-items-center">
          <div class="left-controls">
            {% if request.path != '/' %}
              <button class="btn btn-secondary" onclick="goBackFresh()">Back</button>
            {% endif %}
          </div>
          <div class="right-controls">
            {% if request.path != '/' %}
              <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Home</a>
            {% endif %}
            <a class="btn btn-outline-danger" href="{{ url_for('logout') }}">Logout</a>
          </div>
        </div>
      </div>
    {% endif %}
    {% block content %}
    {% endblock content %}
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <script>
      function goBackFresh() {
        const fallbackUrl = {{ url_for('index') | string | tojson }};
        const referrer = document.referrer;
        if (referrer) {
          try {
            const refUrl = new URL(referrer, window.location.origin);
            if (refUrl.origin === window.location.origin) {
              window.location.href = refUrl.href;
              return;
            }
          } catch (error) {
            console.warn('Unable to parse referrer for back navigation', error);
          }
        }
        window.location.href = fallbackUrl;
      }
    </script>
  </body>
</html>
