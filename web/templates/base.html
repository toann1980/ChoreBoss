<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="ChoreBoss - Manage your chores efficiently" />
    <meta name="keywords" content="chores, management, productivity, ChoreBoss" />
    <title>
      {% block title %}
        ChoreBoss
      {% endblock title %}
    </title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="icon"
          href="{{ url_for('static', filename='images/favicon.ico') }}"
          type="image/x-icon" />
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}" />
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
  </head>
  <body>
    {% if session.get('token') %}
      <div class="container mt-3 d-flex justify-content-end gap-2">
        {% if request.path != '/' %}
          <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Home</a>
        {% endif %}
        <a class="btn btn-outline-danger" href="{{ url_for('logout') }}">Logout</a>
      </div>
    {% endif %}
    {% block content %}
    {% endblock content %}
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
  </body>
</html>
