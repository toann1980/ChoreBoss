{% extends "base.html" %}
{% block title %}
  Add Chore
{% endblock title %}
{% block content %}
  <div class="container-lg">
    <h1 class="mt-5">Add Chore</h1>
    <form method="post" action="{{ url_for('add_chore') }}">
      <div class="form-group">
        <label for="name">Chore Name</label>
        <input type="text" class="form-control" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea class="form-control"
                  id="description"
                  name="description"
                  rows="3"
                  required></textarea>
      </div>
      <div class="form-group">
        <label for="person_id">Assigned To</label>
        <select class="form-control" id="person_id" name="person_id">
          <option value="">-- Select a person --</option>
          {% for person in people %}
            <option value='{{ person.id }}'>
              {{ person.first_name }} {{ person.last_name }}
            </option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Add Chore</button>
    </form>
  </div>
{% endblock content %}
