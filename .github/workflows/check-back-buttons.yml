name: Check page-level Back buttons

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  check-back-buttons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/check-back-buttons.sh

      - name: Run back-button check
        run: scripts/check-back-buttons.sh
