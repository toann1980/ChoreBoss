version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: choreboss-app
    restart: unless-stopped
    ports:
      - "8055:8055"
    env_file:
      - .env
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: envestero-db
    environment:
      POSTGRES_USER: envestero
      POSTGRES_PASSWORD: envestero_dev_password
      POSTGRES_DB: envestero
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - envestero_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envestero -d envestero"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  envestero_pgdata:
